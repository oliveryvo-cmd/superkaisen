<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperKaisen — Rise of the Heroes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;}
canvas{display:block;}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:none;}
#top-left{position:absolute;top:20px;left:20px;}
#game-title{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#ffd700,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;}
#hero-name{font-size:0.65rem;letter-spacing:3px;color:#ffd700;margin-top:2px;}

/* Health & Energy bars */
#bars{position:absolute;top:20px;right:20px;width:200px;}
#hp-label{font-size:0.55rem;letter-spacing:2px;color:#ff4466;margin-bottom:3px;text-align:right;}
#hp-track{width:100%;height:8px;background:rgba(255,255,255,0.08);border-radius:50px;overflow:hidden;margin-bottom:8px;}
#hp-fill{height:100%;width:100%;background:linear-gradient(90deg,#ff2244,#ff6688);border-radius:50px;transition:width 0.3s;}
#ep-label{font-size:0.55rem;letter-spacing:2px;color:#ffd700;margin-bottom:3px;text-align:right;}
#ep-track{width:100%;height:8px;background:rgba(255,255,255,0.08);border-radius:50px;overflow:hidden;}
#ep-fill{height:100%;width:60%;background:linear-gradient(90deg,#ffd700,#ffaa00);border-radius:50px;transition:width 0.3s;}

/* Level & XP */
#level-wrap{position:absolute;bottom:80px;left:20px;background:rgba(0,0,0,0.7);border:1px solid rgba(255,215,0,0.3);border-radius:12px;padding:10px 14px;min-width:160px;}
#level-txt{font-size:0.85rem;font-weight:900;color:#ffd700;}
#xp-bar{width:100%;height:4px;background:rgba(255,255,255,0.08);border-radius:50px;overflow:hidden;margin-top:6px;}
#xp-fill{height:100%;width:0%;background:linear-gradient(90deg,#7b2ff7,#00e5ff);border-radius:50px;transition:width 0.5s;}
#xp-txt{font-size:0.55rem;color:#555;margin-top:4px;letter-spacing:1px;}

/* Skills */
#skills{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;}
.skill{width:54px;height:54px;border-radius:12px;border:2px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.4rem;position:relative;}
.skill-key{position:absolute;bottom:2px;right:4px;font-size:0.5rem;color:#555;font-weight:700;}
.skill-cd{position:absolute;inset:0;border-radius:10px;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;font-size:0.7rem;color:#ffd700;font-weight:900;}
.skill.ready{border-color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,0.3);}

/* Kill feed */
#killfeed{position:absolute;top:80px;right:20px;display:flex;flex-direction:column;gap:6px;max-width:220px;}
.kf{background:rgba(0,0,0,0.75);border-left:3px solid #ffd700;padding:5px 12px;font-size:0.7rem;color:#fff;border-radius:0 8px 8px 0;animation:kfFade 3s forwards;}
@keyframes kfFade{0%,70%{opacity:1;}100%{opacity:0;}}

/* Controls */
#controls{position:absolute;bottom:20px;right:20px;font-size:0.6rem;color:#333;line-height:2.2;text-align:right;}
#controls span{color:#ffd700;font-weight:900;}

/* Flash */
#flash{position:absolute;inset:0;pointer-events:none;transition:background 0.15s;}

/* TITLE SCREEN */
#titlescreen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;}
#ts-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,#1a0040,#000);}
#ts-stars{position:absolute;inset:0;}
#ts-content{position:relative;z-index:2;text-align:center;}
#ts-logo{font-size:5rem;font-weight:900;background:linear-gradient(135deg,#ffd700,#7b2ff7,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:8px;text-shadow:none;}
#ts-sub{font-size:0.7rem;letter-spacing:6px;color:#444;margin-bottom:60px;}
#ts-hero{font-size:8rem;margin-bottom:30px;filter:drop-shadow(0 0 30px #ffd700);}
#ts-start{padding:16px 48px;background:linear-gradient(135deg,#ffd700,#ffaa00);border:none;border-radius:50px;font-size:1rem;font-weight:900;color:#000;cursor:pointer;letter-spacing:2px;transition:all 0.2s;box-shadow:0 0 30px rgba(255,215,0,0.4);}
#ts-start:hover{transform:scale(1.06);box-shadow:0 0 50px rgba(255,215,0,0.6);}
#ts-tagline{font-size:0.62rem;color:#333;margin-top:20px;letter-spacing:3px;}

/* GAME OVER */
#gameover{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.9);}
#gameover h1{font-size:4rem;font-weight:900;color:#ff2244;margin-bottom:16px;}
#gameover p{color:#555;letter-spacing:3px;font-size:0.75rem;margin-bottom:40px;}
#btn-restart{padding:14px 40px;background:#ff2244;border:none;border-radius:50px;color:#fff;font-size:0.9rem;font-weight:900;cursor:pointer;letter-spacing:2px;}

/* LEVEL UP */
#levelup{position:fixed;inset:0;z-index:150;display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
#lu-text{font-size:3rem;font-weight:900;background:linear-gradient(135deg,#ffd700,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:luPop 2s forwards;}
@keyframes luPop{0%{opacity:0;transform:scale(0.5);}20%{opacity:1;transform:scale(1.2);}80%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(1);}}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="titlescreen">
  <div id="ts-bg"></div>
  <canvas id="ts-stars" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
  <div id="ts-content">
    <div id="ts-logo">SuperKaisen</div>
    <div id="ts-sub">RISE OF THE HEROES</div>
    <div id="ts-hero">⚡</div>
    <button id="ts-start" onclick="startGame()">▶ START GAME</button>
    <div id="ts-tagline">PLAY AS OLLIE — THE LIGHTNING HERO</div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover">
  <h1>DEFEATED</h1>
  <p>YOU WERE BEATEN BY THE DARKNESS</p>
  <button id="btn-restart" onclick="location.reload()">↺ TRY AGAIN</button>
</div>

<!-- LEVEL UP -->
<div id="levelup"><div id="lu-text">⚡ LEVEL UP!</div></div>

<!-- HUD -->
<div id="hud">
  <div id="top-left">
    <div id="game-title">⚡ SuperKaisen</div>
    <div id="hero-name">OLLIE — LIGHTNING HERO</div>
  </div>
  <div id="bars">
    <div id="hp-label">HP</div>
    <div id="hp-track"><div id="hp-fill"></div></div>
    <div id="ep-label">ENERGY</div>
    <div id="ep-track"><div id="ep-fill"></div></div>
  </div>
  <div id="level-wrap">
    <div id="level-txt">⚡ LEVEL 1</div>
    <div id="xp-bar"><div id="xp-fill"></div></div>
    <div id="xp-txt">0 / 100 XP</div>
  </div>
  <div id="skills">
    <div class="skill ready" id="sk1">⚡<span class="skill-key">Q</span><div class="skill-cd" id="cd1"></div></div>
    <div class="skill ready" id="sk2">💥<span class="skill-key">E</span><div class="skill-cd" id="cd2"></div></div>
    <div class="skill ready" id="sk3">🌀<span class="skill-key">R</span><div class="skill-cd" id="cd3"></div></div>
    <div class="skill ready" id="sk4">🛡️<span class="skill-key">F</span><div class="skill-cd" id="cd4"></div></div>
  </div>
  <div id="controls">
    <span>WASD</span> Move &nbsp;<span>MOUSE</span> Look<br>
    <span>Q</span> Lightning &nbsp;<span>E</span> Blast<br>
    <span>R</span> Vortex &nbsp;<span>F</span> Shield
  </div>
  <div id="killfeed"></div>
  <div id="flash"></div>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script>
// ===== TITLE STARS =====
(function(){
  const c=document.getElementById('ts-stars');
  const ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const stars=Array.from({length:200},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5,s:Math.random()*0.5+0.2}));
  let t=0;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(t*s.s)*0.3})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
    t+=0.02;requestAnimationFrame(draw);
  }
  draw();
})();

// ===== GAME STATE =====
let hp=100,maxHp=100,energy=100,maxEnergy=100;
let level=1,xp=0,xpNeeded=100;
let kills=0;
const keys={};
const cooldowns={q:0,e:0,r:0,f:0};
const CDS={q:3,e:5,r:8,f:10};

function kf(msg,color='#ffd700'){
  const d=document.createElement('div');
  d.className='kf';d.textContent=msg;
  d.style.borderColor=color;
  document.getElementById('killfeed').appendChild(d);
  setTimeout(()=>d.remove(),3000);
}
function flash(r,g,b,a){
  const f=document.getElementById('flash');
  f.style.background=`rgba(${r},${g},${b},${a})`;
  setTimeout(()=>f.style.background='rgba(0,0,0,0)',200);
}
function gainXP(amt){
  xp+=amt;
  if(xp>=xpNeeded){
    xp-=xpNeeded;level++;xpNeeded=Math.floor(xpNeeded*1.4);
    maxHp+=20;hp=Math.min(hp+30,maxHp);
    maxEnergy+=10;
    document.getElementById('level-txt').textContent='⚡ LEVEL '+level;
    const lu=document.getElementById('levelup');
    lu.style.display='flex';
    setTimeout(()=>lu.style.display='none',2000);
    kf('🎉 LEVEL UP! Now level '+level,'#ffd700');
  }
  document.getElementById('xp-fill').style.width=(xp/xpNeeded*100)+'%';
  document.getElementById('xp-txt').textContent=xp+' / '+xpNeeded+' XP';
}
function updateBars(){
  document.getElementById('hp-fill').style.width=(hp/maxHp*100)+'%';
  document.getElementById('ep-fill').style.width=(energy/maxEnergy*100)+'%';
}

// Character select
let chosenChar = null;
const CHAR_DATA = {
  ollie: {name:'Ollie',title:'LIGHTNING HERO',emoji:'⚡',speed:12,power:'Lightning Strike'},
  speedgirl: {name:'Speed Girl',title:'SUPER SPEED',emoji:'🔴',speed:18,power:'Sonic Dash'}
};

window.startGame=function(){
  document.getElementById('titlescreen').style.display='none';
  // Show character select
  const cs=document.createElement('div');
  cs.id='charselect';
  cs.style.cssText='position:fixed;inset:0;z-index:90;background:radial-gradient(ellipse at 50% 60%,#1a0040,#000);display:flex;flex-direction:column;align-items:center;justify-content:center;';
  cs.innerHTML=`
    <div style="font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,#ffd700,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;">CHOOSE YOUR HERO</div>
    <div style="font-size:0.65rem;letter-spacing:4px;color:#444;margin-bottom:50px;">EVERY HERO HAS A COOL ABILITY</div>
    <div style="display:flex;gap:30px;">
      <div onclick="pickChar('ollie',this)" style="width:200px;padding:30px 20px;border-radius:20px;border:2px solid rgba(255,215,0,0.2);background:rgba(255,215,0,0.05);cursor:pointer;text-align:center;transition:all 0.2s;" onmouseover="this.style.borderColor='#ffd700';this.style.transform='translateY(-8px)'" onmouseout="this.style.borderColor='rgba(255,215,0,0.2)';this.style.transform='translateY(0)'">
        <div style="font-size:4rem;margin-bottom:12px;">⚡</div>
        <div style="font-size:1.1rem;font-weight:900;color:#ffd700;margin-bottom:6px;">OLLIE</div>
        <div style="font-size:0.65rem;color:#ffd700;letter-spacing:2px;margin-bottom:10px;">LIGHTNING HERO</div>
        <div style="font-size:0.62rem;color:#555;line-height:1.6;">Gold & black space armor. Spiky dark blue hair. Purple glowing eyes. Lightning powers.</div>
      </div>
      <div onclick="pickChar('speedgirl',this)" style="width:200px;padding:30px 20px;border-radius:20px;border:2px solid rgba(255,50,50,0.2);background:rgba(255,50,50,0.05);cursor:pointer;text-align:center;transition:all 0.2s;" onmouseover="this.style.borderColor='#ff3333';this.style.transform='translateY(-8px)'" onmouseout="this.style.borderColor='rgba(255,50,50,0.2)';this.style.transform='translateY(0)'">
        <div style="font-size:4rem;margin-bottom:12px;">💨</div>
        <div style="font-size:1.1rem;font-weight:900;color:#ff4444;margin-bottom:6px;">SPEED GIRL</div>
        <div style="font-size:0.65rem;color:#ff4444;letter-spacing:2px;margin-bottom:10px;">SUPER SPEED</div>
        <div style="font-size:0.62rem;color:#555;line-height:1.6;">Red & silver speed armor. White flowing hair. Red glowing eyes. Thruster boots.</div>
      </div>
    </div>
  `;
  document.body.appendChild(cs);
};

window.pickChar=function(char){
  chosenChar=char;
  document.getElementById('charselect').remove();
  document.getElementById('hud').style.display='block';
  const cd=CHAR_DATA[char];
  document.getElementById('hero-name').textContent=cd.emoji+' '+cd.name+' — '+cd.title;
  initBabylon(char);
};

function initBabylon(charKey){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;inset:0;width:100%;height:100%;z-index:1;';
  document.body.appendChild(canvas);

  const engine=new BABYLON.Engine(canvas,true);
  const scene=new BABYLON.Scene(engine);
  scene.clearColor=new BABYLON.Color4(0.02,0.0,0.06,1);
  scene.fogMode=BABYLON.Scene.FOGMODE_EXP2;scene.fogDensity=0.005;
  scene.fogColor=new BABYLON.Color3(0.05,0.0,0.1);
  scene.gravity=new BABYLON.Vector3(0,-0.6,0);
  scene.collisionsEnabled=true;

  // Lighting
  const sun=new BABYLON.DirectionalLight('sun',new BABYLON.Vector3(-1,-2,-1),scene);sun.intensity=2;
  const hem=new BABYLON.HemisphericLight('hem',new BABYLON.Vector3(0,1,0),scene);hem.intensity=0.6;hem.diffuse=new BABYLON.Color3(0.6,0.4,1);
  const sg=new BABYLON.ShadowGenerator(2048,sun);sg.useBlurExponentialShadowMap=true;

  // ===== WORLD =====
  // Ground
  const ground=BABYLON.MeshBuilder.CreateGround('g',{width:500,height:500,subdivisions:8},scene);
  const gm=new BABYLON.StandardMaterial('gm',scene);
  gm.diffuseColor=new BABYLON.Color3(0.04,0.02,0.08);gm.specularColor=new BABYLON.Color3(0.2,0.1,0.3);
  ground.material=gm;ground.receiveShadows=true;ground.checkCollisions=true;

  // Grid lines
  const gridLines=[];
  for(let i=-250;i<=250;i+=20){
    const h=BABYLON.MeshBuilder.CreateGround('gl',{width:500,height:0.05},scene);h.position.set(0,0.01,i);
    const v=BABYLON.MeshBuilder.CreateGround('glv',{width:0.05,height:500},scene);v.position.set(i,0.01,0);
    const lm=new BABYLON.StandardMaterial('lm'+i,scene);lm.emissiveColor=new BABYLON.Color3(0.15,0.05,0.25);lm.alpha=0.5;
    h.material=lm;v.material=lm;
  }

  // Floating platforms
  const platforms=[];
  [[0,8,0,30,2,30],[40,15,40,20,2,20],[-40,12,40,18,2,18],[40,20,-40,15,2,15],
   [-40,18,-40,22,2,22],[0,25,60,16,2,16],[0,25,-60,16,2,16],[60,10,0,18,2,18],[-60,14,0,18,2,18]
  ].forEach(([x,y,z,w,h,d])=>{
    const p=BABYLON.MeshBuilder.CreateBox('plat',{width:w,height:h,depth:d},scene);p.position.set(x,y,z);
    const pm=new BABYLON.StandardMaterial('pm',scene);pm.diffuseColor=new BABYLON.Color3(0.1,0.05,0.2);pm.emissiveColor=new BABYLON.Color3(0.05,0.02,0.12);
    p.material=pm;p.receiveShadows=true;p.checkCollisions=true;sg.addShadowCaster(p);
    // Glowing edge
    const edge=BABYLON.MeshBuilder.CreateBox('edge',{width:w+0.2,height:0.15,depth:d+0.2},scene);edge.position.set(x,y+h/2+0.07,z);
    const em=new BABYLON.StandardMaterial('em',scene);em.emissiveColor=new BABYLON.Color3(0.4,0.1,0.8);edge.material=em;
    platforms.push(p);
  });

  // Crystals
  for(let i=0;i<30;i++){
    const angle=Math.random()*Math.PI*2;const dist=30+Math.random()*100;
    const cx=Math.cos(angle)*dist,cz=Math.sin(angle)*dist;
    const h=5+Math.random()*15;
    const cry=BABYLON.MeshBuilder.CreateCylinder('cry',{height:h,diameterTop:0,diameterBottom:2+Math.random()*2,tessellation:6},scene);
    cry.position.set(cx,h/2,cz);
    const crym=new BABYLON.StandardMaterial('crym'+i,scene);
    crym.emissiveColor=new BABYLON.Color3(Math.random()*0.3,Math.random()*0.2,0.5+Math.random()*0.5);
    crym.alpha=0.8;cry.material=crym;sg.addShadowCaster(cry);
  }

  // Planets in sky
  [[0,200,-300,60,0.3,0.5,1],[200,150,200,40,1,0.3,0.3],[-200,180,-200,50,0.3,1,0.5]].forEach(([x,y,z,r,cr,cg,cb])=>{
    const planet=BABYLON.MeshBuilder.CreateSphere('planet',{diameter:r*2,segments:16},scene);planet.position.set(x,y,z);
    const pm=new BABYLON.StandardMaterial('pm'+x,scene);pm.emissiveColor=new BABYLON.Color3(cr*0.3,cg*0.3,cb*0.3);pm.diffuseColor=new BABYLON.Color3(cr,cg,cb);planet.material=pm;
  });

  // Stars
  for(let i=0;i<300;i++){
    const s=BABYLON.MeshBuilder.CreateSphere('s',{diameter:0.3+Math.random()*0.5,segments:4},scene);
    s.position.set((Math.random()-0.5)*600,(Math.random())*200,(Math.random()-0.5)*600);
    const sm=new BABYLON.StandardMaterial('sm'+i,scene);sm.emissiveColor=new BABYLON.Color3(1,1,1);s.material=sm;
  }

  // ===== PLAYER =====
  const player=BABYLON.MeshBuilder.CreateCapsule('player',{height:1.8,radius:0.4,tessellation:8},scene);
  player.position.set(0,1,0);player.visibility=0;player.checkCollisions=true;player.applyGravity=true;
  player.ellipsoid=new BABYLON.Vector3(0.4,0.9,0.4);player.ellipsoidOffset=new BABYLON.Vector3(0,0.9,0);

  // ===== CHARACTER MODEL — Real Image Sprites =====
  const charNode=new BABYLON.TransformNode('char',scene);
  charNode.parent=player;
  let cape=null,capeMat=null,auraMat=null;

  function makeMat(r,g,b,er,eg,eb,alpha){
    const m=new BABYLON.StandardMaterial('mat'+Math.random(),scene);
    m.diffuseColor=new BABYLON.Color3(r,g,b);
    m.emissiveColor=new BABYLON.Color3(er,eg,eb);
    if(alpha!==undefined)m.alpha=alpha;
    return m;
  }

  // Load GLB character model
  let playerVisual=null;
  BABYLON.SceneLoader.ImportMesh('','','ollie.glb',scene,function(meshes,ps2,skeletons,animGroups){
    playerVisual=meshes[0];
    playerVisual.parent=player;
    playerVisual.position.set(0,-0.9,0);
    playerVisual.scaling.setAll(0.012);
    meshes.forEach(m=>sg.addShadowCaster(m));

    // Play idle animation if available
    if(animGroups&&animGroups.length>0){
      animGroups[0].play(true);
    }

    // Add gold armor overlay on chest
    const chestArmor=BABYLON.MeshBuilder.CreateBox('chestArmor',{width:0.08,height:0.1,depth:0.04},scene);
    chestArmor.parent=player;chestArmor.position.set(0,0.6,-0.22);
    const cam2=new BABYLON.StandardMaterial('cam2',scene);cam2.diffuseColor=new BABYLON.Color3(0.85,0.65,0);cam2.emissiveColor=new BABYLON.Color3(0.5,0.35,0);chestArmor.material=cam2;

    // Lightning bolt
    const bolt=BABYLON.MeshBuilder.CreateBox('bolt',{width:0.025,height:0.06,depth:0.03},scene);
    bolt.parent=player;bolt.position.set(0,0.62,-0.26);
    const bm=new BABYLON.StandardMaterial('bm',scene);bm.emissiveColor=new BABYLON.Color3(1,1,0.1);bolt.material=bm;

    // Purple eye glow
    [-0.035,0.035].forEach((x,i)=>{
      const eyeGlow=BABYLON.MeshBuilder.CreateSphere('eg'+i,{diameter:0.025,segments:6},scene);
      eyeGlow.parent=player;eyeGlow.position.set(x,0.88,-0.13);
      const em=new BABYLON.StandardMaterial('em'+i,scene);em.emissiveColor=new BABYLON.Color3(0.7,0.1,1);eyeGlow.material=em;
    });

    // Gold shoulder pads
    [-0.12,0.12].forEach((x,i)=>{
      const sp=BABYLON.MeshBuilder.CreateBox('sp'+i,{width:0.06,height:0.05,depth:0.07},scene);
      sp.parent=player;sp.position.set(x,0.72,0);sp.material=cam2;sg.addShadowCaster(sp);
    });
  });

  if(charKey==='ollie'){

      if(!e.userData||!e.userData.alive) return;
      const d=BABYLON.Vector3.Distance(e.position,player.position);
      if(d<12){damageEnemy(e,40+level*6);e.position.addInPlace(player.position.subtract(e.position).normalize().scale(3));}
    });
  }

  function shield(){
    if(cooldowns.f>0) return;
    cooldowns.f=CDS.f;
    kf('🛡️ Shield activated!','#00e5ff');
    hp=Math.min(maxHp,hp+30);updateBars();
    const sh=BABYLON.MeshBuilder.CreateSphere('shield',{diameter:3,segments:8},scene);
    sh.parent=player;sh.position.y=0.9;
    const shm=new BABYLON.StandardMaterial('shm',scene);shm.emissiveColor=new BABYLON.Color3(0,0.8,1);shm.alpha=0.2;sh.material=shm;
    effects.push({mesh:sh,life:3,shieldRef:true});
    setTimeout(()=>{if(sh&&!sh.isDisposed())sh.dispose();},3000);
  }

  function damageEnemy(e,dmg){
    if(!e.userData||!e.userData.alive) return;
    e.userData.hp-=dmg;
    // Red flash
    const rf=BABYLON.MeshBuilder.CreateSphere('rf',{diameter:1.5,segments:4},scene);rf.position.copyFrom(e.position).addInPlaceFromFloats(0,1,0);
    const rfm=new BABYLON.StandardMaterial('rfm',scene);rfm.emissiveColor=new BABYLON.Color3(1,0,0);rfm.alpha=0.5;rf.material=rfm;
    effects.push({mesh:rf,life:0.25});
    if(e.userData.hp<=0){
      e.userData.alive=false;kills++;
      kf('💀 '+e.userData.name+' defeated! +'+e.userData.xpReward+' XP','#ff4466');
      gainXP(e.userData.xpReward);
      // Death explosion
      const ex=BABYLON.MeshBuilder.CreateSphere('ex',{diameter:3,segments:6},scene);ex.position.copyFrom(e.position).addInPlaceFromFloats(0,1,0);
      const exm=new BABYLON.StandardMaterial('exm',scene);exm.emissiveColor=new BABYLON.Color3(1,0.3,0);exm.alpha=0.7;ex.material=exm;
      effects.push({mesh:ex,life:0.5});
      e.dispose();
      // Respawn enemy after delay
      setTimeout(()=>{
        const angle=Math.random()*Math.PI*2;const dist=30+Math.random()*50;
        spawnEnemy(Math.cos(angle)*dist,Math.sin(angle)*dist);
      },8000);
    }
  }

  // Input
  window.addEventListener('keydown',e=>{
    keys[e.code]=true;
    if(e.code==='KeyQ') lightningStrike();
    if(e.code==='KeyE') energyBlast();
    if(e.code==='KeyR') gravityVortex();
    if(e.code==='KeyF') shield();
  });
  window.addEventListener('keyup',e=>keys[e.code]=false);

  // ===== GAME LOOP =====
  let vy=0;let t=0;
  engine.runRenderLoop(()=>{
    const dt=engine.getDeltaTime()/1000;t+=dt;

    // Cooldown timers
    ['q','e','r','f'].forEach((k,i)=>{
      cooldowns[k]=Math.max(0,cooldowns[k]-dt);
      const idx=i+1;
      const cd=document.getElementById('cd'+idx);
      const sk=document.getElementById('sk'+idx);
      if(cooldowns[k]>0){cd.style.display='flex';cd.textContent=Math.ceil(cooldowns[k]);sk.classList.remove('ready');}
      else{cd.style.display='none';sk.classList.add('ready');}
    });

    // Energy regen
    energy=Math.min(maxEnergy,energy+8*dt);

    // Movement
    const spd=12*(keys['ShiftLeft']||keys['ShiftRight']?1.8:1);
    const fwd=cam.getForwardRay().direction;
    const F=new BABYLON.Vector3(fwd.x,0,fwd.z).normalize();
    const R=BABYLON.Vector3.Cross(BABYLON.Vector3.Up(),F).normalize();
    let mv=BABYLON.Vector3.Zero();
    if(keys['KeyW']||keys['ArrowUp'])   mv.addInPlace(F);
    if(keys['KeyS']||keys['ArrowDown']) mv.subtractInPlace(F);
    if(keys['KeyA']||keys['ArrowLeft']) mv.addInPlace(R);
    if(keys['KeyD']||keys['ArrowRight'])mv.subtractInPlace(R);

    if(mv.length()>0){
      mv.normalize();
      const ta=Math.atan2(mv.x,mv.z);
      charNode.rotation.y=BABYLON.Scalar.LerpAngle(charNode.rotation.y,ta,0.12);
    }

    const ray=new BABYLON.Ray(player.position,new BABYLON.Vector3(0,-1,0),1.1);
    const hit=scene.pickWithRay(ray,m=>m!==player&&m.name!=='aura'&&m.name!=='lv');
    const grounded=hit&&hit.hit;
    if(grounded){if(keys['Space']){vy=10;keys['Space']=false;}else vy=0;}
    else vy=Math.max(vy-28*dt,-25);
    const vel=mv.scale(spd*dt);vel.y=vy*dt;
    player.moveWithCollisions(vel);
    if(player.position.y<0.9){player.position.y=0.9;vy=0;}

    // Rotate player visual toward movement
    if(playerVisual&&mv.length()>0){
      const ta=Math.atan2(mv.x,mv.z);
      playerVisual.rotation.y=BABYLON.Scalar.LerpAngle(playerVisual.rotation.y,ta,0.15);
    }
    // Cape flutter
    if(cape)cape.rotation.z=Math.sin(t*3)*0.08+(mv.length()>0?0.15:0);

    // Camera
    cam.target=BABYLON.Vector3.Lerp(cam.target,player.position.add(new BABYLON.Vector3(0,0.8,0)),0.1);

    // Aura pulse
    auraMat.alpha=0.05+Math.sin(t*2)*0.03;

    // Effect cleanup
    for(let i=effects.length-1;i>=0;i--){
      const ef=effects[i];ef.life-=dt;
      if(ef.spin)ef.mesh.rotation.z+=dt*3;
      if(ef.life<=0&&!ef.shieldRef){ef.mesh.dispose();effects.splice(i,1);}
      else if(ef.life<=0&&ef.shieldRef){effects.splice(i,1);}
    }

    // Enemy AI
    enemies.forEach(e=>{
      if(!e.userData||!e.userData.alive||e.isDisposed()) return;
      const d=player.position.subtract(e.position);d.y=0;const dist=d.length();
      if(dist<60){
        d.normalize();
        e.position.addInPlace(d.scale(e.userData.speed*dt));
        const ev=e.getChildren()[0];if(ev)ev.rotation.y=Math.atan2(d.x,d.z);
        // Attack player
        if(dist<2){
          e.userData.attackTimer=(e.userData.attackTimer||0)+dt;
          if(e.userData.attackTimer>1){
            e.userData.attackTimer=0;
            hp=Math.max(0,hp-8);flash(255,0,0,0.25);
            if(hp<=0){document.getElementById('gameover').style.display='flex';}
          }
        }
      }
    });

    updateBars();
    scene.render();
  });

  window.addEventListener('resize',()=>engine.resize());
}
</script>
</body>
</html>
